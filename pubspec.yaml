name: skiventure
description: "SKIVENTURE – Khulafaur Rasyidin Learning App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Video Player (Local)
  video_player: ^2.8.3

  # YouTube Player
  youtube_player_flutter: ^8.1.2

  # Utility
  shared_preferences: ^2.3.0
  intl: ^0.19.0

  # Calendar
  table_calendar: ^3.1.2

  # WebView
  webview_flutter: ^4.8.0
  webview_flutter_android: ^3.16.0

  # Icons
  cupertino_icons: ^1.0.8

  # firebase_core:
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  flutter_inappwebview: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - lib/videos/